name: Daily Skills Sync

on:
  schedule:
    - cron: '0 0 * * *' # 每天北京时间 08:00 运行
  workflow_dispatch:      # 允许手动触发测试

# 解决 Node.js 20 弃用警告的关键设置
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Your Repo
        uses: actions/checkout@v4 # 虽然它报警告，但设置 env 后它会强制在 Node 24 下运行

      - name: Sync Humanizer-zh (Single File)
        run: |
          mkdir -p skills/humanizer-zh
          curl -L https://raw.githubusercontent.com/op7418/Humanizer-zh/main/SKILL.md -o skills/humanizer-zh/SKILL.md

      - name: Sync Obsidian-skills (Specific Folders)
        run: |
          git clone --depth 1 https://github.com/kepano/obsidian-skills.git temp_obsidian
          mkdir -p skills
          
          # 定义需要同步的四个目标
          TARGETS=("json-canvas" "Obsidian-bases" "obsidian-cli" "Obsidian-markdown")
          
          for item in "${TARGETS[@]}"; do
            if [ -e "temp_obsidian/skills/$item" ]; then
              echo "同步 $item 中..."
              rm -rf "skills/$item"
              cp -r "temp_obsidian/skills/$item" "skills/"
            fi
          done
          
          rm -rf temp_obsidian

      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          git add skills/
          
          if git diff --quiet && git diff --staged --quiet; then
            echo "没有发现内容变化，跳过提交。"
          else
            git commit -m "chore: 自动同步上游 Skills 变更"
            git push origin HEAD
          fi